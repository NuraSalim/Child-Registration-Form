<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Child Registration Form</title>

<style>
/* BASE */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#ffffff;
  color:#111827;
}

.wrap{
  width:100%;
  padding:24px 32px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:24px;
}
.logo{
  height:80px;
}
h1{
  margin:0;
  font-size:24px;
}
.sub{
  font-size:14px;
  color:#6b7280;
}

/* FORM ELEMENTS */
label{
  display:block;
  margin:6px 0 4px;
  font-size:13px;
  color:#374151;
}

input, select, textarea{
  width:100%;
  max-width:420px;
  padding:8px 10px;
  border:1px solid #d1d5db;
  border-radius:6px;
  font-size:13px;
}

textarea{
  min-height:80px;
}

/* FIELDSET */
fieldset{
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:16px;
  margin-bottom:20px;
}

legend{
  font-size:14px;
  font-weight:bold;
  padding:0 8px;
}

/* GRID */
.grid{
  display:grid;
  gap:18px;
}

@media(min-width:900px){
  .cols-2{grid-template-columns:1fr 1fr;}
  .cols-3{grid-template-columns:1fr 1fr 1fr;}
}

/* SIDE BY SIDE (EN / AR) */
.side-by-side{
  display:grid;
  gap:24px;
}
@media(min-width:1100px){
  .side-by-side{
    grid-template-columns:1fr 1fr;
  }
}

/* RADIO & CHECKBOX */
.radio-group,
.checkbox-group{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:8px;
  margin-top:6px;
}

.radio-group label,
.checkbox-group label{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
}

input[type="radio"],
input[type="checkbox"]{
  width:14px;
  height:14px;
  margin:0;
}

/* ARABIC FIX */
.arabic-section{
  direction:ltr;
}
.arabic-section label,
.arabic-section input{
  direction:rtl;
  text-align:right;
}

/* NOTE */
.note{
  font-size:13px;
  color:#b45309;
  margin-top:8px;
}

/* ACTIONS */
.actions{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-top:24px;
}

button{
  padding:10px 20px;
  font-size:14px;
  border-radius:8px;
  border:1px solid #d1d5db;
  background:#ffffff;
  cursor:pointer;
}

button.primary{
  background:#2563eb;
  color:#ffffff;
  border-color:#2563eb;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- HEADER -->
  <header class="header">
    <img src="Immaginemm.png" alt="Logo" class="logo">
    <div>
      <h1>Child Registration Form</h1>
      <p class="sub">All fields are mandatory unless stated otherwise</p>
    </div>
  </header>

  <!-- FORM -->
  <form method="POST" action="submit.php">

    <!-- IDENTIFICATION -->
    <fieldset>
      <legend>Identification</legend>
      <label>Passport / ID</label>
      <input name="passport_id" required>
    </fieldset>

    <!-- NAMES -->
    <div class="side-by-side">

      <!-- ENGLISH -->
      <fieldset>
        <legend>Name (English)</legend>
        <div class="grid cols-2">
          <div><label>First Name</label><input name="First_Name_en" required></div>
          <div><label>Father Name</label><input name="Father_Name_en" required></div>
          <div><label>Grandfather Name</label><input name="Grandfather_Name_en" required></div>
          <div><label>Last Name</label><input name="Last_Name_en" required></div>
        </div>
      </fieldset>

      <!-- ARABIC -->
      <fieldset class="arabic-section">
        <legend>اسم الطفل (بالعربي)</legend>
        <div class="grid cols-2">
          <div><label>الاسم الأول</label><input name="First_Name_ar" required></div>
          <div><label>اسم الأب</label><input name="Father_Name_ar" required></div>
          <div><label>اسم الجد</label><input name="Grandfather_Name_ar" required></div>
          <div><label>اسم العائلة</label><input name="Last_Name_ar" required></div>
        </div>
      </fieldset>

    </div>

    <!-- PERSONAL INFO -->
    <fieldset>
      <legend>Personal Information</legend>
      <div class="grid cols-3">
        <div>
          <label>Gender</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="Male" required> Male</label>
            <label><input type="radio" name="gender" value="Female" required> Female</label>
          </div>
        </div>
        <div>
          <label>Date of Birth</label>
          <input type="date" name="date_of_birth" required>
        </div>
        <div>
          <label>Nationality</label>
          <input name="nationality" required>
        </div>
        <div>
          <label>Blood Type</label>
          <select name="blood_type" required>
            <option value="">Select</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option>
            <option>O+</option><option>O-</option>
          </select>
        </div>
      </div>
    </fieldset>

    <!-- MEDICAL -->
    <fieldset>
      <legend>Medical Information</legend>
      <label>Medical Notes</label>
      <textarea name="medical_notes" required></textarea>
    </fieldset>

    <!-- ACTIONS -->
    <div class="actions">
      <button type="reset">Clear</button>
      <button type="submit" class="primary">Submit</button>
    </div>

  </form>

</div>

</body>
</html>
