<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Child Registration Form</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#2563eb;
      --radius:14px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:24px;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
    }

    .header{
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:20px;
    }

    .logo{
      height:70px;
    }

    h1{
      margin:0;
      font-size:22px;
    }

    .sub{
      margin-top:4px;
      color:var(--muted);
      font-size:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:20px;
      box-shadow:0 10px 24px rgba(0,0,0,.05);
    }

    .image-box{
      text-align:center;
      margin-bottom:20px;
    }

    .image-box img{
      max-width:180px;
      border-radius:12px;
      border:1px solid var(--line);
      padding:6px;
      background:#fff;
    }

    .grid{
      display:grid;
      gap:14px;
    }

    @media(min-width:820px){
      .grid.cols-2{ grid-template-columns:1fr 1fr; }
      .grid.cols-3{ grid-template-columns:1fr 1fr 1fr; }
    }

    fieldset{
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
      margin-top:14px;
    }

    legend{
      font-size:13px;
      font-weight:bold;
      color:var(--muted);
    }

    label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      color:var(--muted);
    }

    input, select, textarea{
      width:100%;
      padding:10px;
      border:1px solid var(--line);
      border-radius:10px;
      font-size:14px;
    }

    textarea{
      min-height:90px;
    }

    .radio-group{
      display:flex;
      gap:14px;
      margin-top:6px;
    }

    .actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:20px;
    }

    button{
      padding:10px 16px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:bold;
    }

    button.primary{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }
  </style>
</head>
